version: '3.8'

services:
  # ==================== 前端 ====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    environment:
      - VITE_API_BASE=/api
    depends_on:
      - backend
    networks:
      - aicreatorvault-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==================== 后端 ====================
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DOCKER_ENV=true
      - PORT=3001
      - DB_TYPE=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-aicreatorvault}
      - DB_USER=${DB_USER:-aicreator}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - IMAGE_SERVICE_URL=http://image-service:8001
      - REDIS_URL=redis://redis:6379
      - QDRANT_URL=http://qdrant:6333
      - OPENAI_API_KEY=${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      - OPENAI_VISION_MODEL=${OPENAI_VISION_MODEL:-gpt-4o-mini}
      - OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
    volumes:
      # 使用 bind mount，数据存储在宿主机
      # 修改为你 NAS 上的实际路径
      - ${UPLOADS_PATH:-./uploads}:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      image-service:
        condition: service_started
    networks:
      - aicreatorvault-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==================== AI 图片服务 ====================
  image-service:
    build:
      context: ./image-service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      - OPENAI_VISION_MODEL=${OPENAI_VISION_MODEL:-gpt-4o-mini}
      - OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      - QDRANT_URL=http://qdrant:6333
      - SERVICE_PORT=8001
      # 通过 aigc-xray 代理访问 OpenAI API
      - HTTP_PROXY=http://aigc-xray:1087
      - HTTPS_PROXY=http://aigc-xray:1087
      - NO_PROXY=localhost,127.0.0.1,qdrant,backend,redis,postgres
    volumes:
      # 共享 uploads 目录（只读），用于分析图片
      - ${UPLOADS_PATH:-./uploads}:/app/uploads:ro
    depends_on:
      - qdrant
      - aigc-xray
    networks:
      - aicreatorvault-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==================== PostgreSQL + pgvector ====================
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_USER=${DB_USER:-aicreator}
      - POSTGRES_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - POSTGRES_DB=${DB_NAME:-aicreatorvault}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-pgvector.sql:/docker-entrypoint-initdb.d/init-pgvector.sql:ro
    networks:
      - aicreatorvault-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-aicreator} -d ${DB_NAME:-aicreatorvault}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Redis 缓存 ====================
  redis:
    image: redis:alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - aicreatorvault-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ==================== Qdrant 向量数据库 ====================
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - aicreatorvault-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==================== Xray 代理 ====================
  aigc-xray:
    image: teddysun/xray
    container_name: aigc-xray
    restart: unless-stopped
    ports:
      - "8107:1087"   # HTTP 代理 (避免与现有 xray 冲突)
    volumes:
      - ./xray/config.json:/etc/xray/config.json:ro
    networks:
      - aicreatorvault-net
    healthcheck:
      test: ["CMD", "xray", "version"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  qdrant_data:

networks:
  aicreatorvault-net:
    driver: bridge
